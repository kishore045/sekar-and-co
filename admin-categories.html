<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Categories | Sekar Admin</title><link rel="stylesheet" href="styles.css" /></head>
  <body class="admin-shell-page">
    <aside class="admin-sidebar"><a class="admin-logo" href="admin.html"><span>S</span><strong>Sekar Admin</strong></a><nav class="admin-nav"><a href="admin.html"><span class="nav-home"></span>Ecommerce</a><a href="admin-products.html"><span class="nav-product"></span>Product</a><a class="active" href="admin-categories.html"><span class="nav-category"></span>Category</a><div class="admin-subnav"><a href="#categories">All Category</a><a href="#add-category">Add Category</a></div><a href="admin-orders.html"><span class="nav-order"></span>Order</a><a href="admin-users.html"><span class="nav-users"></span>Users</a><a href="admin-settings.html"><span class="nav-store"></span>Store Setting</a><a href="admin-reports.html"><span class="nav-report"></span>Report</a><a href="admin-settings.html"><span class="nav-setting"></span>Setting</a></nav><button id="adminLogoutButton" type="button">Log Out</button></aside>
    <main class="admin-main"><header class="admin-topbar"><label class="admin-search"><span>Search</span><input id="adminSearch" type="search" placeholder="Search categories..." /></label><div class="admin-top-actions"><button class="admin-icon-btn"><span class="flag-india"><i></i><i></i><i></i></span></button><button class="admin-icon-btn">◐</button><button class="admin-icon-btn has-dot">⌁</button><button class="admin-icon-btn">□</button><div class="admin-user"><span>SA</span><div><strong>Sekar Admin</strong><small>Sale Administrator</small></div></div><a class="admin-gear" href="admin-settings.html"></a></div></header>
      <section class="admin-page-title"><div><h1>All Category</h1><p>Manage home page and product listing categories.</p></div><a class="admin-add-btn" href="#add-category">+ Add new</a></section>
      <section class="admin-section" id="categories"><div class="admin-toolbar"><select><option>Showing 10 entries</option></select><input id="adminCategorySearch" type="search" placeholder="Search here..." /><select><option>All Categories</option></select><select><option>Sort by (Default)</option></select></div><div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Category</th><th>Quantity</th><th>Sale</th><th>Start date</th><th>Action</th></tr></thead><tbody id="adminCategoryRows"></tbody></table></div></section>
      <section class="admin-section admin-form-section" id="add-category"><h2>Add Category</h2><form id="adminCategoryForm" class="admin-form"><label>Category name<input id="adminCategoryName" required /></label><label>Quantity<input id="adminCategoryQty" type="number" value="0" required /></label><label>Sale<input id="adminCategorySale" type="number" value="0" required /></label><label>Start date<input id="adminCategoryDate" type="date" /></label><button class="primary-btn" type="submit">Save Category</button></form></section>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script><script src="firebase-store.js"></script><script src="script.js"></script>
  </body>
</html>
